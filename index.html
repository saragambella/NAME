<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NAME</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">
    <header class="hero">
      <h1>NAME</h1>
      <p>Main catalog</p>
    </header>

    <section class="filters-section">
      <div class="filters-header">
        <h2>Filters</h2>
        <div class="filters-actions">
          <span id="resultsCount">0 results</span>
          <button id="resetFilters" type="button">Reset filters</button>
        </div>
      </div>

      <div class="filter-block">
        <h3>Text filters</h3>
        <div class="filters-grid" id="textFiltersGrid"></div>
      </div>

      <div class="filter-block">
        <h3>Themes</h3>
        <div class="chip-group" id="themesButtons"></div>
      </div>

      <div class="filter-block">
        <h3>Genre</h3>
        <div class="chip-group" id="genreButtons"></div>
      </div>
    </section>

    <section class="table-section">
      <div class="table-wrapper">
        <table>
          <thead>
            <tr id="tableHeadRow"></tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="main.js"></script>
</body>
</html>
